name: verify-shared

on:
  workflow_call:
    inputs:
      profile:
        required: false
        type: string
        default: full
      run-e2e-smoke:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      WHEELHOUSE_DIR: .runtime/python/wheels
      PLAYWRIGHT_BROWSERS_PATH: .runtime/browser/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node
        if: inputs.profile == 'full' || inputs.profile == 'pr-fast' || inputs.profile == 'pr-smoke'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Python wheel cache
        if: inputs.profile != 'pr-smoke'
        run: |
          mkdir -p "$WHEELHOUSE_DIR"
          if [ "${{ inputs.profile }}" = "deploy-minimal" ]; then
            python -m pip download -r requirements-ci-min.lock.txt --dest "$WHEELHOUSE_DIR"
          else
            python -m pip download -r requirements-dev.lock.txt --dest "$WHEELHOUSE_DIR"
          fi

      - name: Install Python test dependencies
        if: inputs.profile != 'pr-smoke'
        run: |
          if [ "${{ inputs.profile }}" = "deploy-minimal" ]; then
            python -m pip install --no-index --find-links "$WHEELHOUSE_DIR" -r requirements-ci-min.lock.txt
          else
            python -m pip install --no-index --find-links "$WHEELHOUSE_DIR" -r requirements-dev.lock.txt
          fi

      - name: Check minimal CI dependency guardrails
        if: inputs.profile != 'pr-smoke'
        run: python tools/check_min_ci_requirements.py

      - name: Install Node dependencies
        if: inputs.profile == 'full' || inputs.profile == 'pr-fast' || inputs.profile == 'pr-smoke'
        run: npm ci

      - name: Cache Playwright browsers
        if: (inputs.profile == 'full' && inputs.run-e2e-smoke) || inputs.profile == 'pr-smoke'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: (inputs.profile == 'full' && inputs.run-e2e-smoke) || inputs.profile == 'pr-smoke'
        run: |
          mkdir -p "$PLAYWRIGHT_BROWSERS_PATH"
          max_retries=2
          attempt=0
          until npx playwright install chromium; do
            if [ "$attempt" -ge "$max_retries" ]; then
              echo "playwright install chromium failed after $((attempt + 1)) attempts"
              exit 1
            fi
            sleep_seconds=$((2 ** attempt))
            echo "playwright install chromium failed on attempt $((attempt + 1)); retry in ${sleep_seconds}s"
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

      - name: Build Pages dist
        if: inputs.profile == 'deploy-minimal'
        run: python tools/build_pages_dist.py

      - name: Verify Pages dist startup shell
        if: inputs.profile == 'deploy-minimal'
        run: python -m unittest tests.test_pages_dist_startup_shell -q

      - name: Run Python unit tests
        if: inputs.profile == 'full'
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run Python fast contracts
        if: inputs.profile == 'pr-fast'
        run: >
          python -m unittest
          tests.test_app_entry_resolver
          tests.test_map_renderer_interaction_border_snapshot_orchestration_contract
          tests.test_perf_gate_contract
          tests.test_startup_shell
          -q

      - name: Run renderer split node behavior tests
        if: inputs.profile == 'full' || inputs.profile == 'pr-fast'
        run: npm run test:node:renderer-splits

      - name: Run scenario chunk static contracts
        if: inputs.profile == 'full' || inputs.profile == 'pr-fast'
        run: npm run test:node:scenario-chunk-contracts

      - name: Run physical layer static contracts
        if: inputs.profile == 'full' || inputs.profile == 'pr-fast'
        run: npm run test:node:physical-layer-contracts

      - name: Verify E2E layer manifest
        if: inputs.profile == 'pr-fast'
        run: npm run verify:test:e2e-layers

      - name: Run strict TNO scenario contract gate
        if: inputs.profile == 'full' || inputs.profile == 'pr-fast'
        run: python tools/check_scenario_contracts.py --strict --scenario-dir data/scenarios/tno_1962 --report-path .runtime/reports/generated/tno_1962.strict_contract_report.json

      - name: Run smoke E2E
        if: (inputs.profile == 'full' && inputs.run-e2e-smoke) || inputs.profile == 'pr-smoke'
        run: npm run test:e2e:smoke

      - name: Upload deploy dist artifact
        if: inputs.profile == 'deploy-minimal'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deploy-dist
          path: dist
          # Keep .nojekyll in the handoff artifact; upload-artifact omits hidden files by default.
          include-hidden-files: true
