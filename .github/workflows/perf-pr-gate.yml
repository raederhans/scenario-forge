name: perf-pr-gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: perf-pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  perf-gate:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BROWSERS_PATH: .runtime/browser/ms-playwright
      PERF_DEV_SERVER_READY_TIMEOUT_MS: "90000"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 50

      - name: Classify perf-relevant changes
        id: classify
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path '.runtime/reports/generated' | Out-Null

          function Convert-GlobToRegex([string]$pattern) {
            $normalized = $pattern.Replace('\', '/')
            $escaped = [Regex]::Escape($normalized)
            $escaped = $escaped.Replace('\*\*', '.*')
            $escaped = $escaped.Replace('\*', '[^/]*')
            $escaped = $escaped.Replace('\?', '[^/]')
            return "^$escaped$"
          }

          $eventPayload = Get-Content -Raw -Path $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          if ($env:GITHUB_EVENT_NAME -eq 'pull_request') {
            $baseSha = $eventPayload.pull_request.base.sha
            $headSha = $eventPayload.pull_request.head.sha
          } else {
            $baseSha = $eventPayload.before
            $headSha = if ($eventPayload.after) { $eventPayload.after } else { $env:GITHUB_SHA }
          }

          if (-not $baseSha -or $baseSha -match '^0+$') {
            $baseSha = (git rev-parse "$headSha^" 2>$null)
          }

          if (-not $headSha) {
            throw 'Unable to resolve head SHA for perf gate classifier'
          }

          git cat-file -e "$baseSha^{commit}" 2>$null
          if ($LASTEXITCODE -ne 0 -and $baseSha) {
            git fetch --no-tags --depth=50 origin $baseSha
          }

          $diffRange = if ($baseSha) { "$baseSha...$headSha" } else { $headSha }
          $changedFiles = @(
            git diff --name-only $diffRange 2>$null |
              ForEach-Object { $_.Trim().Replace('\', '/') } |
              Where-Object { $_ }
          )
          if ($LASTEXITCODE -ne 0) {
            $changedFiles = @(
              git diff --name-only HEAD^ HEAD 2>$null |
                ForEach-Object { $_.Trim().Replace('\', '/') } |
                Where-Object { $_ }
            )
          }

          $rules = @(
            @{
              name = 'perf-workflow'
              reason = 'perf gate workflow changed'
              patterns = @('.github/workflows/perf-pr-gate.yml')
            },
            @{
              name = 'perf-baseline-docs'
              reason = 'perf baseline or perf docs changed'
              patterns = @('docs/perf/**')
            },
            @{
              name = 'runtime-js'
              reason = 'runtime JavaScript can change measured behavior'
              patterns = @('js/**')
            },
            @{
              name = 'app-shell'
              reason = 'app shell markup or styles can change startup and rendering behavior'
              patterns = @('index.html', 'css/**', 'vendor/**')
            },
            @{
              name = 'scenario-registry'
              reason = 'scenario registry can change startup selection and measured scenario inputs'
              patterns = @('data/scenarios/index.json')
            },
            @{
              name = 'perf-scenario-data'
              reason = 'measured scenario data changed'
              patterns = @('data/scenarios/tno_1962/**', 'data/scenarios/hoi4_1939/**')
            },
            @{
              name = 'playwright-app-support'
              reason = 'playwright app support affects perf harness'
              patterns = @('tests/e2e/support/**', 'playwright.config.cjs')
            },
            @{
              name = 'perf-tools'
              reason = 'perf tooling changed'
              patterns = @('tools/perf/**')
            },
            @{
              name = 'dev-server'
              reason = 'dev server behavior affects perf runs'
              patterns = @('tools/dev_server.py')
            },
            @{
              name = 'node-manifests'
              reason = 'dependency manifest can affect perf gate environment'
              patterns = @('package.json', 'package-lock.json')
            }
          )

          $ruleHits = @()
          foreach ($rule in $rules) {
            $regexes = @($rule.patterns | ForEach-Object { Convert-GlobToRegex $_ })
            $matchedFilesForRule = @(
              $changedFiles |
                Where-Object {
                  $file = $_
                  ($regexes | Where-Object { $file -match $_ } | Select-Object -First 1)
                } |
                Sort-Object -Unique
            )

            if ($matchedFilesForRule.Count -gt 0) {
              $ruleHits += [ordered]@{
                name = $rule.name
                reason = $rule.reason
                patterns = $rule.patterns
                files = $matchedFilesForRule
              }
            }
          }

          $matchedRuleNames = @($ruleHits | ForEach-Object { $_.name })
          $shouldRunPerf = $ruleHits.Count -gt 0
          if ($shouldRunPerf) {
            $reason = "run npm run perf:gate because matched rules: $($matchedRuleNames -join ', ')"
          } elseif ($changedFiles.Count -eq 0) {
            $reason = 'skip npm run perf:gate because no changed files were detected in the PR diff'
          } else {
            $reason = 'skip npm run perf:gate because no perf-related classifier rules matched'
          }

          $audit = [ordered]@{
            base_sha = $baseSha
            head_sha = $headSha
            changed_files = $changedFiles
            matched_rules = $ruleHits
            should_run_perf = $shouldRunPerf
            reason = $reason
          }

          $auditJsonPath = '.runtime/reports/generated/perf-pr-gate-classifier.json'
          $auditMdPath = '.runtime/reports/generated/perf-pr-gate-classifier.md'
          $audit | ConvertTo-Json -Depth 8 | Set-Content -Path $auditJsonPath

          $changedFileLines = if ($changedFiles.Count -gt 0) {
            ($changedFiles | ForEach-Object { '- `' + $_ + '`' }) -join "`n"
          } else {
            '- _none_'
          }

          $matchedRuleLines = if ($ruleHits.Count -gt 0) {
            ($ruleHits | ForEach-Object {
              $patterns = ($_.patterns | ForEach-Object { '`' + $_ + '`' }) -join ', '
              $files = ($_.files | ForEach-Object { '`' + $_ + '`' }) -join ', '
              ('- `' + $_.name + '` — ' + $_.reason + "`n  - patterns: $patterns`n  - files: $files")
            }) -join "`n"
          } else {
            '- _none_'
          }

          $summary = @(
            '## Perf classifier audit'
            "- should run perf gate: $($shouldRunPerf.ToString().ToLowerInvariant())"
            "- reason: $reason"
            ''
            '### Changed files'
            $changedFileLines
            ''
            '### Matched rules'
            $matchedRuleLines
          ) -join "`n"
          Set-Content -Path $auditMdPath -Value $summary
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

          "should_run_perf=$($shouldRunPerf.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload perf classifier audit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-pr-gate-classifier-audit
          path: .runtime/reports/generated/perf-pr-gate-classifier.*

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.classify.outputs.should_run_perf == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.classify.outputs.should_run_perf == 'true'
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        if: steps.classify.outputs.should_run_perf == 'true'
        run: npm ci

      - name: Cache Playwright Chromium
        if: steps.classify.outputs.should_run_perf == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Chromium
        if: steps.classify.outputs.should_run_perf == 'true'
        run: npx playwright install chromium

      - name: Run perf gate
        if: steps.classify.outputs.should_run_perf == 'true'
        run: npm run perf:gate

      - name: Upload perf failure artifacts
        if: failure() && steps.classify.outputs.should_run_perf == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-pr-gate-failure-artifacts
          if-no-files-found: ignore
          path: |
            .runtime/output/perf/**
            .runtime/tmp/perf-baseline-dev-server.*.log
            .runtime/tests/playwright/**

      - name: Fast success for perf-unrelated changes
        if: steps.classify.outputs.should_run_perf != 'true'
        run: |
          Write-Host "Perf gate skipped after classifier decision: ${{ steps.classify.outputs.reason }}"
