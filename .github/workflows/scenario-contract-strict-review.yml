name: Scenario Contract Strict Review

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  strict-tno-contract-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare report directory
        run: mkdir -p .runtime/reports/generated

      - name: Run strict TNO scenario contract review
        run: python tools/check_scenario_contracts.py --strict --scenario-dir data/scenarios/tno_1962 --report-path .runtime/reports/generated/tno_1962.strict_contract_report.json

      - name: Upload strict contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tno-1962-strict-contract-report
          path: .runtime/reports/generated/tno_1962.strict_contract_report.json
