name: Scenario Contract Matrix

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  strict-scenario-contract-review:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario_id:
          - tno_1962
          - hoi4_1936
          - hoi4_1939
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 50

      - name: Classify scenario contract relevance
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual or non-PR event" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags --depth=50 origin "$base_sha" || true
          mkdir -p .runtime/tmp
          changed_files_path=".runtime/tmp/scenario-contract-changed-files.txt"
          if git diff --name-only "$base_sha...$head_sha" > "$changed_files_path" 2>/dev/null; then
            :
          else
            git diff --name-only HEAD^ HEAD > "$changed_files_path" 2>/dev/null || true
          fi
          mapfile -t changed_files < <(sed 's#\\#/#g' "$changed_files_path")

          should_run=false
          reason="no scenario contract paths changed"
          for file in "${changed_files[@]}"; do
            case "$file" in
              data/scenarios/*|tools/check_scenario_contracts.py|map_builder/config.py|map_builder/contracts.py|.github/workflows/scenario-contract-matrix.yml)
                should_run=true
                reason="scenario contract path changed: $file"
                break
                ;;
            esac
          done

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "Scenario contract classifier: $reason" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Python
        if: steps.classify.outputs.should_run == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Prepare report directory
        if: steps.classify.outputs.should_run == 'true'
        run: mkdir -p .runtime/reports/generated

      - name: Run strict scenario contract review (${{ matrix.scenario_id }})
        if: steps.classify.outputs.should_run == 'true'
        run: python tools/check_scenario_contracts.py --strict --scenario-dir data/scenarios/${{ matrix.scenario_id }} --report-path .runtime/reports/generated/${{ matrix.scenario_id }}.strict_contract_report.json

      - name: Fast success for scenario-unrelated changes
        if: steps.classify.outputs.should_run != 'true'
        run: echo "Scenario contract matrix skipped: ${{ steps.classify.outputs.reason }}"

      - name: Upload strict contract report (${{ matrix.scenario_id }})
        if: always() && steps.classify.outputs.should_run == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.scenario_id }}-strict-contract-report
          path: .runtime/reports/generated/${{ matrix.scenario_id }}.strict_contract_report.json
