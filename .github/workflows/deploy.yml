name: Build and Deploy Scenario Forge

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  # 策略：同一分支只保留最新部署任务，旧任务自动取消。
  group: "pages"
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/verify-shared.yml
    with:
      profile: deploy-minimal
      run-e2e-smoke: false

  build:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: python -m pip install -r requirements.lock.txt

      - name: Assemble Pages dist
        run: python tools/build_pages_dist.py

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
