name: Build and Deploy Scenario Forge

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.lock.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run playwright:install:chromium

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run renderer split node behavior tests
        run: npm run test:node:renderer-splits

      - name: Run strict TNO scenario contract gate
        run: python tools/check_scenario_contracts.py --strict --scenario-dir data/scenarios/tno_1962 --report-path .runtime/reports/generated/tno_1962.strict_contract_report.json

      - name: Run smoke E2E
        run: npm run test:e2e:smoke

      - name: Run strategic overlay smoke E2E
        run: npm run test:e2e:strategic-overlay-smoke

  build:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: python -m pip install -r requirements.lock.txt

      - name: Generate Map Data
        run: python init_map_data.py

      - name: Assemble Pages dist
        run: python tools/build_pages_dist.py

      - name: Verify Pages dist startup shell
        run: python -m unittest tests.test_pages_dist_startup_shell -q

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
