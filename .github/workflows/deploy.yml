name: Build and Deploy Scenario Forge

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  # 策略：同一分支只保留最新部署任务，旧任务自动取消。
  group: "pages"
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/verify-shared.yml
    with:
      profile: deploy-minimal
      run-e2e-smoke: false

  build:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      pages: write
    steps:
      - name: Download verified dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: deploy-dist
          path: dist

      - name: Validate dist artifact payload
        run: |
          test -f dist/index.html
          test -f dist/app/index.html
          test -f dist/.nojekyll
          test -f dist/app/js/main.js
          test -f dist/app/data/scenarios/index.json
          test -f dist/pages-dist-manifest.json
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("dist/pages-dist-manifest.json").read_text(encoding="utf-8"))
          total_bytes = int(manifest["total_bytes"])
          max_allowed_bytes = int(manifest["max_allowed_bytes"])
          if total_bytes > max_allowed_bytes:
              raise SystemExit(f"dist size {total_bytes} exceeds gate {max_allowed_bytes}")
          print(f"dist size ok: {total_bytes / (1024 * 1024):.2f} MiB")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
