name: Transport Contract Required

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  transport-contract-required:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 50

      - name: Classify transport contract relevance
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=main push or manual transport verification" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags --depth=50 origin "$base_sha" || true
          mkdir -p .runtime/tmp
          changed_files_path=".runtime/tmp/transport-contract-changed-files.txt"
          if git diff --name-only "$base_sha...$head_sha" > "$changed_files_path" 2>/dev/null; then
            :
          else
            git diff --name-only HEAD^ HEAD > "$changed_files_path" 2>/dev/null || true
          fi
          mapfile -t changed_files < <(sed 's#\\#/#g' "$changed_files_path")

          should_run=false
          reason="no transport contract paths changed"
          for file in "${changed_files[@]}"; do
            case "$file" in
              data/transport_layers/*|tools/check_transport_workbench_manifests.py|tools/build_transport_workbench_*|tools/build_global_transport_*|tests/test_transport_*|tests/test_global_transport_builder_contracts.py|.github/workflows/transport-contract-required.yml)
                should_run=true
                reason="transport path changed: $file"
                break
                ;;
            esac
          done

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "Transport classifier: $reason" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Python
        if: steps.classify.outputs.should_run == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python test dependencies
        if: steps.classify.outputs.should_run == 'true'
        run: python -m pip install -r requirements-dev.lock.txt

      - name: Run transport manifest validator
        if: steps.classify.outputs.should_run == 'true'
        run: python tools/check_transport_workbench_manifests.py --root data/transport_layers --report-path .runtime/reports/generated/transport_workbench_manifest_report.json

      - name: Run transport manifest unit tests
        if: steps.classify.outputs.should_run == 'true'
        run: python -m unittest tests.test_transport_manifest_contracts tests.test_transport_workbench_manifest_runtime_contract -q

      - name: Fast success for transport-unrelated changes
        if: steps.classify.outputs.should_run != 'true'
        run: echo "Transport contract skipped: ${{ steps.classify.outputs.reason }}"
