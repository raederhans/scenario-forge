# Shared MCPs such as github/context7/sentry are configured globally in ~/.codex/config.toml.
# This project file only keeps the local browser-inspection override.
[mcp_servers.playwright]
command = "bash"
startup_timeout_sec = 120
cwd = "/mnt/c/Users/raede/Desktop/dev/mapcreator"
args = [
  "ops/browser-mcp/start-playwright-mcp-stdio.sh",
  "--browser", "msedge",
  "--no-sandbox",
  "--caps", "vision,devtools",
  "--console-level", "warning",
  "--output-dir", ".mcp-artifacts",
  "--allowed-hosts", "localhost,127.0.0.1",
  "--allowed-origins", "http://localhost:*;http://127.0.0.1:*"
]
